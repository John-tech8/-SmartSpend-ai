<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SmartSpend AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        .auth-title {
            color: #1a202c;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
            background-color: white;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #2f6df6;
            box-shadow: 0 0 0 3px rgba(47, 109, 246, 0.1);
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .phone-group select {
            width: 30%;
        }

        .phone-group input {
            width: 70%;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2f6df6;
            color: white;
        }

        .btn-primary:hover {
            background: #1e4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }

        .auth-link {
            display: block;
            margin-top: 20px;
            color: #4a5568;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .auth-link a {
            color: #2f6df6;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>

        <form id="signupForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <div class="phone-group">
                    <select id="countryCode">
                        <option value="+1">+1 (US/CA)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="+91">+91 (IN)</option>
                        <option value="+61">+61 (AU)</option>
                    </select>
                    <input type="tel" id="phone" required placeholder="9876543210">
                </div>
            </div>

            <div class="input-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
                <div id="dobError" class="error-message">You must be at least 18 years old to sign up.</div>
            </div>

            <div class="input-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                </select>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Create a password">
            </div>

            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>

        <form id="quizForm" style="display: none;">
            <p style="margin-bottom: 20px; color: #4a5568;">Let's customize your experience with a quick 5-question
                financial personality quiz!</p>

            <div class="input-group">
                <label>1. When you receive money, what is your first instinct?</label>
                <select id="q1" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="saver">Put a portion into savings</option>
                    <option value="spender">Buy something I've been wanting</option>
                    <option value="impulsive">Treat myself immediately without thinking</option>
                </select>
            </div>
            <div class="input-group">
                <label>2. How do you feel about budgeting?</label>
                <select id="q2" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="saver">I love it, I track every penny</option>
                    <option value="spender">I have a loose budget in my head</option>
                    <option value="impulsive">I try but always fail, or don't budget at all</option>
                </select>
            </div>
            <div class="input-group">
                <label>3. If you see something you want but don't need, what do you do?</label>
                <select id="q3" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="saver">Wait a few days to see if I still want it</option>
                    <option value="spender">Check if I have money, then maybe buy it</option>
                    <option value="impulsive">Buy it immediately</option>
                </select>
            </div>
            <div class="input-group">
                <label>4. Do you have an emergency fund?</label>
                <select id="q4" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="saver">Yes, with 3-6 months of expenses</option>
                    <option value="spender">Yes, but it's very small</option>
                    <option value="impulsive">No, I live paycheck to paycheck</option>
                </select>
            </div>
            <div class="input-group">
                <label>5. How often do you exceed your monthly budget?</label>
                <select id="q5" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="saver">Rarely</option>
                    <option value="spender">Sometimes</option>
                    <option value="impulsive">Often or Always</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="finishSignupBtn">Finish Profile</button>
        </form>

        <div id="quizResult" style="display: none; text-align: center;">
            <h2 id="personalityTitle" style="color: #2f6df6; margin-bottom: 10px;"></h2>
            <p id="personalityDesc" style="color: #4a5568; margin-bottom: 20px; font-size: 15px;"></p>
            <a href="index.html" class="btn btn-primary"
                style="text-decoration: none; padding: 12px 20px; display: inline-block;">Go to Home</a>
        </div>

        <div class="auth-link" id="loginLink">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/pages/quiz.js"></script>
</body>

</html>
